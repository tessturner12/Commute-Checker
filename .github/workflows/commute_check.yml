name: TfL Commute Check

on:
  schedule:
    - cron: '45 3 * * 1-5'  # targets ~6:45am BST — set early to account for GitHub Actions queue delay (~3h on free tier)
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

jobs:
  commute-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run commute check
        env:
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python commute_check.py
